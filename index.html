<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meditation App</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            animation: {
              'ambient-breath': 'breath 8s ease-in-out infinite',
            },
            keyframes: {
              breath: {
                '0%, 100%': { transform: 'scale(1) translate(0px, 0px)', opacity: 0.3 },
                '50%': { transform: 'scale(1.1) translate(10px, -10px)', opacity: 0.5 },
              }
            }
          }
        }
      }
    </script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom Icon wrapper to bridge Lucide vanilla with React smoothly
        const LucideIcon = ({ name, size = 24, fill = "none" }) => {
            const iconRef = React.useRef(null);

            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({
                        icons: { [name]: lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        attrs: {
                            class: 'lucide',
                            'stroke-width': 2,
                            'stroke': 'currentColor',
                            fill: fill,
                            width: size,
                            height: size
                        }
                    });
                }
            }, [name, size, fill]);

            return <i ref={iconRef} data-lucide={name}></i>;
        };

        // Icon Definitions
        const User = (props) => <LucideIcon name="user" {...props} />;
        const Calendar = (props) => <LucideIcon name="calendar" {...props} />;
        const Mail = (props) => <LucideIcon name="mail" {...props} />;
        const Lock = (props) => <LucideIcon name="lock" {...props} />;
        const Eye = (props) => <LucideIcon name="eye" {...props} />;
        const EyeOff = (props) => <LucideIcon name="eye-off" {...props} />;
        const Home = (props) => <LucideIcon name="home" {...props} />;
        const List = (props) => <LucideIcon name="list" {...props} />;
        const RotateCcw = (props) => <LucideIcon name="rotate-ccw" {...props} />;
        const UserCircle = (props) => <LucideIcon name="user-circle" {...props} />;
        const Play = (props) => <LucideIcon name="play" {...props} />;
        const ChevronLeft = (props) => <LucideIcon name="chevron-left" {...props} />;
        const ChevronRight = (props) => <LucideIcon name="chevron-right" {...props} />;
        const Plus = (props) => <LucideIcon name="plus" {...props} />;

            const [rememberMe, setRememberMe] = useState(false);

            const featuredContent = {
                title: "MEDITATION BY DEEPAK CHOPRA",
                year: "2025",
                seasons: "3 Seasons",
                type: "Audio/Video",

                { title: "Meditation By Kata Del Castillo", label: "FREE PREVIEW" },
                { title: "Meditation By Kata Del Castillo", label: "FREE PREVIEW" }

                { title: "Meditation By Kata Del Castillo", type: "Audio", progress: 45 },
                { title: "Meditation By Kata Del Castillo", type: "Video", progress: 80 },
                { title: "Meditation By Kata Del Castillo", type: "Audio", progress: 20 }

                { title: "The Spiritual Laws Of Success", author: "By Deepak Chopra", year: "2025", seasons: "3 Seasons", type: "Meditation", duration: "2h 23m" },

                                    <div key={idx} className="cursor-pointer group relative">

                                            <div className="absolute inset-0 bg-cover bg-center opacity-30 mix-blend-overlay group-hover:opacity-50 transition-opacity duration-500 scale-100 group-hover:scale-110" style={{ backgroundImage: `url('https://images.unsplash.com/photo-1506122713809-1a7f0170a4fb?auto=format&fit=crop&q=80&w=400')` }}></div>
